title: Byteshire
description: Byteshire LLC makes Discboard — an album-listening app for iPhone, iPad, and Mac.
url: https://byteshire.com

# Replace with the Discboard App Store URL once the app is live. Until then the
# "Download on the App Store" button points here.
discboard_app_store_url: "#"

markdown: kramdown
permalink: pretty

# Jekyll omits dot-directories by default, so force the Apple App Site
# Association (Universal Links for Discboard's share extension) into _site.
# The file has no front matter, so Jekyll copies it verbatim.
include:
  - .well-known

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .bundle
